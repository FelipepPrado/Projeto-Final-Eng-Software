name: Integração Contínua (CI)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v3

    - name: Configurar o Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Instalar dependências do Auth Service
      run: |
        cd plataforma/services/auth-service
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest

    - name: Análise Estática de Código (Lint)
      run: |
        cd plataforma/services/auth-service
        # O flake8 vai procurar por erros de sintaxe e más práticas no código
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Executar Testes Automatizados
      run: |
        cd plataforma/services/auth-service
        pytest test_app.py -v