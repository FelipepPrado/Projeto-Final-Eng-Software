name: Pipeline CI - Sprint 2

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-auth-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3
      
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Instalar dependências e Lint
        working-directory: ./plataforma/services/auth-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          
      - name: Rodar Testes Unitários
        working-directory: ./plataforma/services/auth-service
        run: pytest

  test-academic-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3
        
      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Construir e Testar (Maven)
        working-directory: ./plataforma/services/academic-service
        # O Maven já baixa as dependências e roda os testes automaticamente
        run: mvn clean test