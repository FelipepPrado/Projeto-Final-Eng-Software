services:
  frontend-web:
    build: 
      context: ../services/frontend-web
    ports:
      - "8080:80" # Acessaremos o React na porta 8080
    depends_on:
      - assignment-service

  auth-service:
    build: ../services/auth-service
    ports:
      - "8081:5000"  # <--- [PORTA DO SEU PC] : [PORTA INTERNA DO PYTHON]

  academic-service:
    build: 
      context: ../services/academic-service
    ports:
      - "8082:8082"

  assignment-service:
    build: 
      context: ../services/assignment-service
    ports:
      - "8083:8083"