version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: academic_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  auth-service:
    build: 
      context: ../services/auth-service
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=db
      - DB_USER=admin
      - DB_PASS=password
    depends_on:
      - db

  academic-service:
    build: 
      context: ../services/academic-service
    ports:
      - "8082:8082"
    environment:
      - DB_HOST=db
      - DB_USER=admin
      - DB_PASS=password
    depends_on:
      - db

  assignment-service:
    build: 
      context: ../services/assignment-service
    ports:
      - "8083:8083"
    environment:
      - DB_HOST=db
      - DB_USER=admin
      - DB_PASS=password
    depends_on:
      - db

volumes:
  pgdata: